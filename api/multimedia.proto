syntax = "proto3";
package multimedia;

service MultimediaService {
    rpc UploadBlob (UploadBlobRequest) returns (UploadBlobResponse);
    rpc DownloadBlob (DownloadBlobRequest) returns (DownloadBlobResponse);
    rpc DeleteBlob (DeleteBlobRequest) returns (DeleteBlobResponse);
    rpc GetContainerMeta (GetContainerMetaRequest) returns (ContainerMetaResponse);
}

message UploadBlobRequest {
    string blob_name = 1;
    bytes data = 2;
    repeated string tags = 3;
}

message UploadBlobResponse {
    string id = 1;
}

message DownloadBlobRequest {
    string container_meta_id = 1;
}

message DownloadBlobResponse {
    bytes data = 1;
}

message DeleteBlobRequest {
    string container_meta_id = 1;
}

message DeleteBlobResponse {}

message GetContainerMetaRequest {
    string id = 1;
}

message ContainerMetaResponse {
    string id = 1;
    string title = 2;
    double duration = 3;
    int64 file_size_in_kb = 4;
    repeated string tags = 5;
}
