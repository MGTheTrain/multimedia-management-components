syntax = "proto3";
package multimedia;

service MultimediaService {
    // Custom methods (AIP-136)
    rpc UploadBlob (stream UploadBlobRequest) returns (UploadBlobResponse);
    rpc DownloadBlob (DownloadBlobRequest) returns (DownloadBlobResponse);
    // Standard methods (AIP-131, AIP-135)
    rpc GetBlob (GetBlobRequest) returns (ContainerMetaResponse);
    rpc DeleteBlob (DeleteBlobRequest) returns (DeleteBlobResponse);
}

message UploadBlobRequest {
    oneof data {
        BlobInfo info = 1;
        bytes chunk = 2;
    }
}

message BlobInfo {
    string blob_name = 1;
    repeated string tags = 2;
}

message UploadBlobResponse {
    string id = 1;
}

message DownloadBlobRequest {
    string id = 1;
}

message DownloadBlobResponse {
    bytes data = 1;
}

message GetBlobRequest {
    string id = 1;
}

message DeleteBlobRequest {
    string id = 1;
}

message DeleteBlobResponse {}

message ContainerMetaResponse {
    string id = 1;
    string title = 2;
    double duration = 3;
    int64 file_size_in_kb = 4;
    repeated string tags = 5;
}
