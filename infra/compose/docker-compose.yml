services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=diesel-demo
    ports:
      - "5432:5432"
    volumes:
      - postgres-db:/var/lib/postgresql/data
    networks:
      - custom-network
    restart: on-failure
  # For diesel migrations: export DATABASE_URL=postgres://user:password@localhost:5432/diesel-demo
  # psql -h localhost -p 5432 -U user -d diesel-demo

  localstack:
    image: localstack/localstack:4.12.0
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - AWS_DEFAULT_REGION=us-east-1
      - DEBUG=1
    networks:
      - custom-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  localstack-init:
    image: amazon/aws-cli:2.22.0
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    entrypoint: ["aws", "--endpoint-url=http://localstack:4566", "s3", "mb", "s3://test-bucket"]
    depends_on:
      localstack:
        condition: service_healthy
    networks:
      - custom-network
      
  azure-blob-storage:
    image: mcr.microsoft.com/azure-storage/azurite:3.35.0
    container_name: azure-blob-storage
    environment:
      - ACCOUNT_NAME=devstoreaccount1
      - ACCOUNT_KEY=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite-data:/data
    command: ["azurite", "--skipApiVersionCheck", "--blobHost", "0.0.0.0"]
    restart: on-failure
    networks:
      - custom-network

  rest-api:
    profiles:
      - api
    build:
      context: ../..
      dockerfile: infra/docker/rest-api/Dockerfile
    environment:
      - AWS_BUCKET_NAME=test-bucket
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - DATABASE_URL=postgres://user:password@postgres:5432/diesel-demo
      - RUST_LOG=info
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_started
      localstack-init:
        condition: service_completed_successfully
    networks:
      - custom-network
    restart: on-failure

volumes:
  postgres-db:
  azurite-data:

networks:
  custom-network: