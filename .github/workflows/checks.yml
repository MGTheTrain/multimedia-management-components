name: Checks

on:
  workflow_call:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        run: just pre-commit

  sonar:
    name: SonarCloud analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cache cargo-tarpaulin binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tarpaulin
          key: ${{ runner.os }}-tarpaulin-${{ runner.arch }}

      - name: Install cargo-audit
        run: command -v cargo-audit || cargo install cargo-audit --locked

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpq-dev libssl-dev pkg-config protobuf-compiler

      - name: Install tarpaulin
        run: command -v cargo-tarpaulin || cargo install cargo-tarpaulin

      - name: Start services
        run: just compose-start

      - name: Wait for services
        run: |
          until pg_isready -h localhost -p 5432 -U user; do sleep 1; done
          until curl -s http://localhost:4566/_localstack/health \
            | grep -q '"s3": "available"'; do sleep 2; done

      - name: Run sonar analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: just sonar
